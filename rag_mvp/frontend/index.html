<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>arXiv NLP 검색 · P7 키프레이즈 RAG</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> body { background:#0b1020; } ::-webkit-scrollbar{width:8px} ::-webkit-scrollbar-thumb{background:#334155;border-radius:4px} </style>
</head>
<body class="text-slate-200">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const API = "";  // 같은 오리진(백엔드가 이 페이지를 서빙)

    async function post(path, body) {
      const r = await fetch(API + path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }

    function Chip({ text }) {
      const absent = text.endsWith("[A]");
      const label = text.replace(/\[[PA]\]$/, "");
      return (
        <span className={"text-xs px-2 py-0.5 rounded-full mr-1 mb-1 inline-block " +
          (absent ? "bg-amber-500/20 text-amber-300 ring-1 ring-amber-500/40" : "bg-slate-700 text-slate-300")}>
          {label}{absent && <span className="ml-1 opacity-70">absent</span>}
        </span>
      );
    }

    function Card({ r, idx }) {
      const viaKp = r.hit_via === "keyphrase";
      return (
        <div id={"card-" + idx} className="bg-slate-900/70 border border-slate-800 rounded-xl p-4 mb-3 hover:border-indigo-600 transition">
          <div className="flex items-center gap-2 mb-1 flex-wrap">
            <span className="text-xs font-mono bg-indigo-600/30 text-indigo-300 px-2 py-0.5 rounded">#{idx + 1} · {r.score}</span>
            <span className={"text-xs px-2 py-0.5 rounded " + (viaKp ? "bg-emerald-600/25 text-emerald-300" : "bg-slate-700 text-slate-300")}>
              {viaKp ? "🔑 키프레이즈 매칭" : "📄 본문 매칭"}
            </span>
            {r.published && <span className="text-xs text-slate-500">{r.published}</span>}
            {r.category && <span className="text-xs text-slate-500">· {r.category}</span>}
          </div>
          <a href={r.abs_url} target="_blank" className="text-indigo-300 hover:text-indigo-200 font-semibold leading-snug">{r.title}</a>
          {r.authors && <div className="text-xs text-slate-500 mt-0.5 truncate">{r.authors}</div>}
          {r.matched_keyphrases && r.matched_keyphrases.length > 0 &&
            <div className="mt-2">{r.matched_keyphrases.map((k, i) => <Chip key={i} text={k} />)}</div>}
          <p className="text-sm text-slate-400 mt-2 leading-relaxed">{r.abstract}…</p>
        </div>
      );
    }

    function App() {
      const [q, setQ] = useState("");
      const [mode, setMode] = useState("kp");
      const [corpus, setCorpus] = useState("arxiv");
      const [withAnswer, setWithAnswer] = useState(true);
      const [loading, setLoading] = useState(false);
      const [results, setResults] = useState([]);
      const [answer, setAnswer] = useState(null);
      const [health, setHealth] = useState(null);
      const [err, setErr] = useState("");

      useEffect(() => { fetch(API + "/api/health").then(r => r.json()).then(setHealth).catch(() => {}); }, []);

      async function run() {
        if (!q.trim()) return;
        setLoading(true); setErr(""); setAnswer(null); setResults([]);
        try {
          if (withAnswer) {
            const d = await post("/api/answer", { query: q, top_k: 5, corpus });
            setResults(d.results); setAnswer({ text: d.answer, cited: d.cited });
          } else {
            const d = await post("/api/search", { query: q, top_k: 8, mode, corpus });
            setResults(d.results);
          }
        } catch (e) { setErr(String(e.message || e)); }
        setLoading(false);
      }

      return (
        <div className="max-w-3xl mx-auto px-4 py-8">
          <header className="mb-6">
            <h1 className="text-2xl font-bold text-white">arXiv NLP 논문 검색 <span className="text-indigo-400">· P7 키프레이즈 RAG</span></h1>
            <p className="text-sm text-slate-400 mt-1">
              P7이 뽑은 키프레이즈(특히 <span className="text-amber-300">absent</span>)로 색인을 강화 → 어휘가 달라도 검색됩니다.
              {health && health.corpora && <span className="ml-2 text-slate-500">· arXiv {(health.corpora.arxiv||0).toLocaleString()} · KP20k {(health.corpora.kp20k||0).toLocaleString()} 벡터 · {health.device}</span>}
            </p>
          </header>

          <div className="bg-slate-900/70 border border-slate-800 rounded-xl p-4 mb-5">
            <div className="flex gap-2">
              <input value={q} onChange={e => setQ(e.target.value)} onKeyDown={e => e.key === "Enter" && run()}
                placeholder="예: on-device language model agent, retrieval augmented reasoning…"
                className="flex-1 bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 outline-none focus:border-indigo-500" />
              <button onClick={run} disabled={loading}
                className="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white px-5 rounded-lg font-medium">
                {loading ? "검색중…" : "검색"}
              </button>
            </div>
            <div className="flex items-center gap-4 mt-3 text-sm flex-wrap">
              <div className="flex items-center gap-1 text-slate-400">
                코퍼스:
                <button onClick={() => setCorpus("arxiv")} className={"px-2 py-0.5 rounded " + (corpus === "arxiv" ? "bg-indigo-600/30 text-indigo-300" : "hover:text-slate-200")}>arXiv 최신</button>
                <button onClick={() => setCorpus("kp20k")} className={"px-2 py-0.5 rounded " + (corpus === "kp20k" ? "bg-indigo-600/30 text-indigo-300" : "hover:text-slate-200")}>KP20k</button>
                <button onClick={() => setCorpus("mixed")} className={"px-2 py-0.5 rounded " + (corpus === "mixed" ? "bg-indigo-600/30 text-indigo-300" : "hover:text-slate-200")}>혼합(KP20k+arXiv)</button>
              </div>
              <label className="flex items-center gap-1.5 cursor-pointer">
                <input type="checkbox" checked={withAnswer} onChange={e => setWithAnswer(e.target.checked)} />
                <span>LLM 답변 생성</span>
              </label>
              <div className="flex items-center gap-1 text-slate-400">
                색인:
                <button onClick={() => setMode("kp")} className={"px-2 py-0.5 rounded " + (mode === "kp" ? "bg-emerald-600/30 text-emerald-300" : "hover:text-slate-200")}>키프레이즈 강화</button>
                <button onClick={() => setMode("plain")} className={"px-2 py-0.5 rounded " + (mode === "plain" ? "bg-slate-700 text-slate-200" : "hover:text-slate-200")}>본문만</button>
                <span className="text-xs text-slate-600">(답변 OFF일 때 비교)</span>
              </div>
            </div>
          </div>

          {err && <div className="bg-red-900/40 border border-red-800 text-red-300 rounded-lg p-3 mb-4 text-sm">{err}</div>}

          {answer && (
            <div className="bg-gradient-to-br from-indigo-950/60 to-slate-900 border border-indigo-800/60 rounded-xl p-4 mb-5">
              <div className="text-xs text-indigo-300 font-semibold mb-1">🤖 답변 (검색된 논문 근거)</div>
              <p className="text-slate-200 leading-relaxed whitespace-pre-wrap">{answer.text}</p>
              {answer.cited.length > 0 && <div className="text-xs text-slate-500 mt-2">인용: {answer.cited.join(", ")}</div>}
            </div>
          )}

          {results.map((r, i) => <Card key={i} r={r} idx={i} />)}
          {!loading && !results.length && !err && <div className="text-center text-slate-600 py-16">질의를 입력해 검색하세요.</div>}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
